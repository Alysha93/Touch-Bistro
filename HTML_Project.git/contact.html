<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Visit Denmark</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="logo">
    <svg width="60" height="45" viewBox="0 0 37 28" xmlns="http://www.w3.org/2000/svg">
      <rect width="37" height="28" fill="#C8102E"/>
      <rect x="0" y="12" width="37" height="4" fill="#FFFFFF"/>
      <rect x="12" y="0" width="4" height="28" fill="#FFFFFF"/>
    </svg>
  </div>
  <h1>Contact Us</h1>
  <p>We'd love to hear from you!</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="plan-trip.html">Plan Trip</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <div class="flag-accent"></div>
  <h2>Get in Touch</h2>
  <p>Have questions about visiting Denmark? Send us a message using the form below.</p>
  
  <form action="#" method="get">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your Name" required>
    
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Your Email" required>
    
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="How can we help?" required></textarea>
    
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>© 2026 Visit Denmark — Educational Sample Website with Denmark Flag Colors</p>
</footer>

</body>
</html>
